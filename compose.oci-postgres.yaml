services:
  postgres:
    image: postgres:16-bookworm
    container_name: venue-booking-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-venue_booking_manager}
      POSTGRES_USER: ${POSTGRES_USER:-venue_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-venue_admin} -d ${POSTGRES_DB:-venue_booking_manager}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
