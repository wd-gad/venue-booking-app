name: Deploy OCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}

      - name: Sync project files to OCI
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USERNAME: ${{ secrets.OCI_USERNAME }}
        run: |
          rsync -az --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".next/" \
            --exclude "node_modules/" \
            --exclude ".env.local" \
            --exclude ".env.oci" \
            --exclude "backups/" \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "${OCI_USERNAME}@${OCI_HOST}:/home/ubuntu/next-app/"

      - name: Build and restart app on OCI
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd /home/ubuntu/next-app
            export $(grep -v '^#' .env.oci | xargs)
            npm ci
            npm run db:push -- --force
            npm run build
            sudo systemctl restart venue-booking-app.service
            sudo systemctl is-active --quiet venue-booking-app.service
